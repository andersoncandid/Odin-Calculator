<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display"></div>
            <div class="keys">
                <div class="numpad">
                    <button class="btn btn-num btn-press">1</button>
                    <button class="btn btn-num">2</button>
                    <button class="btn btn-num">3</button>
                    <button class="btn btn-num">4</button>
                    <button class="btn btn-num">5</button>
                    <button class="btn btn-num">6</button>
                    <button class="btn btn-num">7</button>
                    <button class="btn btn-num">8</button>
                    <button class="btn btn-num">9</button>
                    <button class="btn btn-num">0</button>
                    <button class="btn btn-num" id="dot">.</button>
                    <button class="btn btn-num" id="negative">+/-</button>
                    <button class="btn btn-cl" id="all_clear">AC</button>
                    <button class="btn btn-cl" id="clear_entry">CE</button>
                </div>
                <div class="operators">
                    <button class="btn btn-op" id="div">÷</button>
                    <button class="btn btn-op" id="mult">×</button>
                    <button class="btn btn-op" id="sub">-</button>
                    <button class="btn btn-op" id="add">+</button>
                    <button class="btn btn-op" id="equal">=</button>
                </div>
            </div>
        </div>
    </body>
</html>
