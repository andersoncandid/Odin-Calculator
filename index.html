<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display">23</div>
            <div class="keys">
                <ul class="numpad">
                    <li class="num 0">0</li>
                    <li class="num 1">1</li>
                    <li class="num 2">2</li>
                    <li class="num 3">3</li>
                    <li class="num 4">4</li>
                    <li class="num 5">5</li>
                    <li class="num 6">6</li>
                    <li class="num 7">7</li>
                    <li class="num 8">8</li>
                    <li class="num 9">9</li>
                    <li class="num dot">.</li>
                    <li class="num negative">+/-</li>
                </ul>
                <ul class="operators">
                    <li class="operator add">+</li>
                    <li class="operator sub">-</li>
                    <li class="operator mult">×</li>
                    <li class="operator div">÷</li>
                </ul>
            </div>
            <ul class="functions">
                <li class="function equal">=</li>
                <li class="function all_clear">AC</li>
                <li class="function clear_entry">CE</li>
            </ul>
        </div>
    </body>
</html>
