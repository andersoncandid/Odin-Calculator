<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display">0</div>
            <div class="keys">
                <div class="numpad">
                    <button class="btn btn-num btn-press">1</button>
                    <button class="btn btn-num btn-press">2</button>
                    <button class="btn btn-num btn-press">3</button>
                    <button class="btn btn-num btn-press">4</button>
                    <button class="btn btn-num btn-press">5</button>
                    <button class="btn btn-num btn-press">6</button>
                    <button class="btn btn-num btn-press">7</button>
                    <button class="btn btn-num btn-press">8</button>
                    <button class="btn btn-num btn-press">9</button>
                    <button class="btn btn-num btn-press">0</button>
                    <button class="btn btn-num btn-press">.</button>
                    <button class="btn btn-num btn-press" id="negative">
                        +/-
                    </button>
                    <button class="btn btn-cl btn-press" id="all_clear">
                        AC
                    </button>
                    <button class="btn btn-cl btn-press" id="clear_entry">
                        CE
                    </button>
                </div>
                <div class="operators">
                    <button class="btn btn-op" id="+">+</button>
                    <button class="btn btn-op" id="-">-</button>
                    <button class="btn btn-op" id="*">×</button>
                    <button class="btn btn-op" id="/">÷</button>
                    <button class="btn btn-op btn-press" id="=">=</button>
                </div>
            </div>
        </div>
    </body>
</html>
