<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display">0</div>
            <div class="keys">
                <div class="numpad">
                    <button class="btn 0">0</button>
                    <button class="btn 1">1</button>
                    <button class="btn 2">2</button>
                    <button class="btn 3">3</button>
                    <button class="btn 4">4</button>
                    <button class="btn 5">5</button>
                    <button class="btn 6">6</button>
                    <button class="btn 7">7</button>
                    <button class="btn 8">8</button>
                    <button class="btn 9">9</button>
                    <button class="btn dot">.</button>
                    <button class="btn negative">+/-</button>
                    <button class="btn btn-cl all_clear">AC</button>
                    <button class="btn btn-cl clear_entry">CE</button>
                </div>
                <div class="operators">
                    <button class="btn btn-op" id="add">+</button>
                    <button class="btn btn-op" id="sub">-</button>
                    <button class="btn btn-op" id="mult">×</button>
                    <button class="btn btn-op" id="divi">÷</button>
                    <button class="btn equal">=</button>
                </div>
            </div>
        </div>
    </body>
</html>
