<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display">0</div>
            <div class="keys">
                <div class="numpad">
                    <button class="btn 0" id="num">0</button>
                    <button class="btn 1" id="num">1</button>
                    <button class="btn 2" id="num">2</button>
                    <button class="btn 3" id="num">3</button>
                    <button class="btn 4" id="num">4</button>
                    <button class="btn 5" id="num">5</button>
                    <button class="btn 6" id="num">6</button>
                    <button class="btn 7" id="num">7</button>
                    <button class="btn 8" id="num">8</button>
                    <button class="btn 9" id="num">9</button>
                    <button class="btn dot" id="num">.</button>
                    <button class="btn negative" id="num">+/-</button>
                    <button class="btn btn-cl" id="all_clear">AC</button>
                    <button class="btn btn-cl" id="clear_entry">CE</button>
                </div>
                <div class="operators">
                    <button class="btn btn-op" id="add">+</button>
                    <button class="btn btn-op" id="sub">-</button>
                    <button class="btn btn-op" id="mult">×</button>
                    <button class="btn btn-op" id="divi">÷</button>
                    <button class="btn" id="equal">=</button>
                </div>
            </div>
        </div>
    </body>
</html>
